name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # typecheck resolve os workspaces internos por dist/ — buildar antes.
      - run: pnpm --filter @notagrafo/core build
      - run: pnpm --filter @notagrafo/graph build
      - run: pnpm --filter @notagrafo/worker build
      - run: pnpm lint
      - run: pnpm typecheck

  test-unit:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # core copia os XSDs para dist no build; o validador precisa deles nos testes.
      # graph/worker precisam de dist/ para serem resolvidos pelos testes da api.
      - run: pnpm --filter @notagrafo/core build
      - run: pnpm --filter @notagrafo/graph build
      - run: pnpm --filter @notagrafo/worker build
      - run: pnpm test:unit --coverage
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/

  test-integration:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @notagrafo/core build
      - run: pnpm --filter @notagrafo/graph build
      - run: pnpm --filter @notagrafo/worker build
      # Testcontainers sobe Neo4j, Redis e MinIO automaticamente
      - run: pnpm test:integration
        env:
          TESTCONTAINERS_RYUK_DISABLED: true

  test-e2e:
    runs-on: ubuntu-latest
    needs: [test-unit, test-integration]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @notagrafo/dashboard exec playwright install --with-deps chromium
      # O compose usa env_file: .env, que não é versionado. Deriva do exemplo.
      - run: cp .env.example .env
      - run: docker compose --profile app up -d --wait
        env:
          DEMO: "true"
          DEMO_NF_COUNT: "50"
      # Cria o usuário demo + NFes que os e2e usam para login (profile demo).
      - run: docker compose --profile app --profile demo run --rm seed
        env:
          DEMO: "true"
          DEMO_NF_COUNT: "50"
      - run: pnpm test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: packages/dashboard/playwright-report/

  # Smoke build of the app images to catch Dockerfile regressions on main.
  # The actual push to GHCR happens on release (see release-please.yml).
  build:
    runs-on: ubuntu-latest
    needs: [test-unit, test-integration]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/api/Dockerfile
          target: production
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build Worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/worker/Dockerfile
          target: production
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build Dashboard image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/dashboard/Dockerfile
          target: production
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
