name: Release

on:
  push:
    branches: [main]

# Needed so release-please can open PRs and create releases/tags, and so the
# publish jobs can push to npm (OIDC provenance) and to GHCR.
permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Publishes the public packages on every release. `pnpm publish -r` does NOT
  # skip versions already on the registry — it errors with E403 and fails the
  # job — so we publish package-by-package and skip any version that already
  # exists. This keeps the step idempotent regardless of which/how many Release
  # PRs were merged (independent versioning means the set is rarely uniform).
  publish-npm:
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance via OIDC
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @notagrafo/core build
      - run: pnpm --filter @notagrafo/graph build
      - run: pnpm --filter @notagrafo/worker build
      - run: pnpm --filter @notagrafo/api build
      - name: Publish public packages (skip versions already on npm)
        run: |
          set -euo pipefail
          for pkg in core graph worker api; do
            name="@notagrafo/$pkg"
            version="$(node -p "require('./packages/$pkg/package.json').version")"
            if npm view "$name@$version" version >/dev/null 2>&1; then
              echo "· $name@$version already published — skipping"
            else
              echo "↑ publishing $name@$version"
              pnpm --filter "$name" publish --access public --no-git-checks --provenance
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"

  # Builds and pushes the application images to GHCR on every release.
  publish-ghcr:
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: api
            dockerfile: packages/api/Dockerfile
          - name: worker
            dockerfile: packages/worker/Dockerfile
          - name: dashboard
            dockerfile: packages/dashboard/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/notagrafo-${{ matrix.name }}
          tags: |
            type=raw,value=latest
            type=sha,format=short
            type=raw,value={{date 'YYYYMMDD-HHmmss'}}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
