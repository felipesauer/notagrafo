name: notagrafo

services:

  # ── Infraestrutura (sempre sobe) ─────────────────────────────

  redis:
    image: redis:7-alpine
    restart: "no"
    ports:
      # Porta de host configurável (REDIS_PORT) — evita conflito com Redis local.
      # A porta interna na rede do compose continua 6379 (api/worker usam redis:6379).
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  neo4j:
    image: neo4j:5-community
    restart: "no"
    ports:
      - "${NEO4J_BROWSER_PORT:-7474}:7474"   # Neo4j Browser
      - "${NEO4J_BOLT_PORT:-7687}:7687"      # Bolt
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-changeme}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD:-changeme}", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: "no"
    ports:
      - "${MINIO_API_PORT:-9000}:9000"       # API S3
      - "${MINIO_CONSOLE_PORT:-9001}:9001"   # Console web
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    restart: "no"
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"   # SMTP (configurável p/ evitar conflito no host)
      - "${MAILPIT_UI_PORT:-8025}:8025"     # UI web
    # Mailpit captura todos os e-mails localmente — não envia para fora

  # ── Aplicação (profile: app) ─────────────────────────────────

  api:
    profiles: ["app"]
    build:
      context: .
      dockerfile: packages/api/Dockerfile
      target: production
    restart: "no"
    ports:
      - "${API_PORT:-3000}:3000"
    env_file: .env
    environment:
      # NODE_ENV=production sobrepõe o .env (que é development p/ o host): a
      # imagem enxuta não tem devDeps (ex.: pino-pretty), então o container
      # PRECISA rodar em produção. `environment` vence `env_file` no Compose.
      NODE_ENV: production
      # Sobrepõe os hosts do .env (localhost = dev no host) pelos nomes de
      # serviço da rede do compose. O Redis escuta 6379 internamente.
      NEO4J_URI: bolt://neo4j:7687
      REDIS_URL: redis://redis:6379
      XML_STORAGE_MINIO_ENDPOINT: http://minio:9000
    depends_on:
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      # 127.0.0.1 (não localhost): no Alpine/musl o localhost resolve ::1 (IPv6)
      # e a API escuta IPv4 0.0.0.0 — localhost daria connection refused.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      # start_period: janela de graça no boot — falhas aqui NÃO contam para o
      # retries. A API roda migrations e conecta no Neo4j (o serviço mais lento
      # a ficar healthy, ~30s) antes de servir /health; sem isso o healthcheck
      # marcava 'unhealthy' durante a subida e o `compose up --wait` falhava (CI e2e).
      start_period: 40s

  worker:
    profiles: ["app"]
    build:
      context: .
      dockerfile: packages/worker/Dockerfile
      target: production
    restart: "no"
    env_file: .env
    environment:
      # NODE_ENV=production: imagem enxuta sem devDeps (ver serviço api).
      NODE_ENV: production
      # Mesma sobreposição de hosts da API (ver comentário no serviço api).
      NEO4J_URI: bolt://neo4j:7687
      REDIS_URL: redis://redis:6379
      XML_STORAGE_MINIO_ENDPOINT: http://minio:9000
    depends_on:
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    deploy:
      replicas: 2   # dois workers por padrão

  dashboard:
    profiles: ["app"]
    build:
      context: .
      dockerfile: packages/dashboard/Dockerfile
      target: production
    restart: "no"
    ports:
      - "${DASHBOARD_PORT:-8080}:80"
    depends_on:
      - api

  # ── Seed demo (profile: demo) ────────────────────────────────

  seed:
    profiles: ["demo"]
    build:
      context: .
      dockerfile: packages/worker/Dockerfile
      target: production
    # dist/ está na raiz após o pnpm deploy (não mais em packages/worker/).
    command: node dist/seed/index.js
    env_file: .env
    environment:
      # NODE_ENV=production: imagem enxuta sem devDeps (ver serviço api).
      NODE_ENV: production
      DEMO: "true"
      DEMO_NF_COUNT: ${DEMO_NF_COUNT:-500}
      NEO4J_URI: bolt://neo4j:7687
      REDIS_URL: redis://redis:6379
      XML_STORAGE_MINIO_ENDPOINT: http://minio:9000
    depends_on:
      api:
        condition: service_healthy
    restart: "no"   # roda uma vez e encerra

volumes:
  redis_data:
  neo4j_data:
  neo4j_logs:
  minio_data:
